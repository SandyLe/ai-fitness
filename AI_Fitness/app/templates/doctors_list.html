{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/doctors_list.css') }}">

{% endblock %}

{% block content %}
<div id="doctors-page" class="container-fluid">
    <!-- 页面标题 -->
    <div class="page-header">
        <h1>康训医师团队</h1>
        <p>我们拥有一支经验丰富、专业素质高的康复医师团队，为您提供专业的康复指导服务</p>
    </div>

    <!-- 医师列表 -->
    <div class="doctors-container">
        <div class="doctors-grid">
        {% for c in doctors_list %}
            <div class="doctor-card" v-for="doctor in pagedDoctors" :key="doctor.name">
                <div class="doctor-image">
                    <img src=" {{'/images/doctor_path?path=' + c.avatar.split('/')[2:] | join('/')}}" :alt="doctor.name" :onerror="doctor.fallback" loading="lazy">
                    <div class="doctor-badge"><i class="fas fa-user-md"></i></div>
                </div>
                <div class="doctor-content">
                    <h3>{{ c.nick_name }}</h3>
                    <p class="doctor-specialty">{{ c.role_name }}</p>
                    <p class="doctor-bio">{{ c.rremark }}</p>
                    <div class="doctor-credentials">
                        <span class="credential-tag"><i class="fas fa-certificate"></i>{{ c.uremark }}</span>
                    </div>
                </div>
            </div>
        {% endfor %}
        </div>
        <!-- 分页器 -->
        <div id="doctorPagination"></div>
    </div>
</div>
{% endblock %}
